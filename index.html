<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Noodler — Extension Preview</title>
		<style>
			:root{--bg:#0f1724;--card:#0b1220;--muted:#9aa4b2;--accent:#7dd3fc}
			body{margin:0;font-family:Inter,system-ui,Segoe UI,Roboto,'Helvetica Neue',Arial;background:linear-gradient(180deg,#071225 0%,#071824 100%);color:#e6eef6;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
			.container{max-width:980px;width:100%}
			.extension-preview{background:var(--card);border-radius:14px;padding:18px;display:flex;gap:18px;align-items:center;box-shadow:0 6px 24px rgba(2,6,23,0.6)}
			.preview-thumb{flex:0 0 160px;height:280px;background:linear-gradient(135deg,#062433,#08324a);border-radius:10px;display:flex;align-items:center;justify-content:center;color:var(--accent);font-weight:700;font-size:18px}
			.preview-meta{flex:1;min-width:0}
			.title-row{display:flex;align-items:center;justify-content:space-between;gap:12px}
			.title{font-size:20px;font-weight:700;margin:0}
			.subtitle{color:var(--muted);margin:6px 0 12px}
			.desc{color:#cfdde9;line-height:1.45;margin:0 0 12px;font-size:14px}
			.actions{display:flex;gap:10px;align-items:center}
			.btn{background:var(--accent);color:#022;padding:8px 12px;border-radius:8px;border:none;font-weight:600;cursor:pointer}
			.secondary{background:transparent;border:1px solid rgba(255,255,255,0.06);color:var(--muted);padding:8px 12px;border-radius:8px}
			.tags{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
			.tag{background:rgba(255,255,255,0.03);padding:6px 8px;border-radius:999px;color:var(--muted);font-size:12px}

			/* Mobile-first: ensure preview is visible on small screens */
			@media (max-width:640px){
				.extension-preview{flex-direction:column;align-items:stretch;padding:14px}
				.preview-thumb{width:100%;height:180px;flex:0 0 auto}
				.title{font-size:18px}
				.actions{justify-content:space-between}
			}
		</style>
	</head>
	<body>
		<div class="container">
			<section class="extension-preview" aria-label="Extension preview">
				<div class="preview-thumb">Preview</div>
				<div class="preview-meta">
					<div class="title-row">
						<div>
							<h3 class="title">Noodler Extension</h3>
							<div class="subtitle">A lightweight content-capture extension</div>
						</div>
						<div class="actions">
							<button class="btn">Install</button>
							<button class="secondary">Learn more</button>
						</div>
					</div>
					<p class="desc">Capture snippets, format quickly, and send them to your Noodler workspace. Built for speed and minimal friction — works on any page.</p>
					<div class="tags">
						<span class="tag">Productivity</span>
						<span class="tag">Extension</span>
						<span class="tag">Beta</span>
					</div>
				</div>
			</section>
		</div>
	</body>
</html>
